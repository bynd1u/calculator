<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./client/assets/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>project!</title>

  <style>
    body {
      margin: 0
    }

    canvas {
      display: block;
    }
  </style>

  <link href="./styles/index.css" rel="stylesheet" />
</head>

<body>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
    import { Box3, Vector3 } from 'three';


    // Scene, Camera, Renderer
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // Soft white light
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7.5); // Light position
    scene.add(directionalLight);

    // Orbit Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Smooth rotation
    controls.dampingFactor = 0.1;

    // Load Model
    const loader = new GLTFLoader();
    loader.load(
      './models/calculator.glb', // Replace this with the path to your .glb file
      (gltf) => {
        scene.add(gltf.scene); // Add the loaded model to the scene
        console.log('Model loaded successfully!');
      },
      (xhr) => {
        console.log((xhr.loaded / xhr.total) * 100 + '% loaded'); // Loading progress
      },
      (error) => {
        console.error('An error occurred while loading the model:', error);
      }
    );
    // Camera Position
    camera.position.set(0, 2, 5); // Adjust based on your model

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>


  <script src="./src/main.js"></script>
</body>

</html>
